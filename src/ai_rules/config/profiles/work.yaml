name: work
description: Work laptop with extended context models
extends: personal
managed_tools:
  install_sources:
    ai-agent-rules: github
    statusline: github
settings_overrides:
  claude:
    env:
      ANTHROPIC_DEFAULT_SONNET_MODEL: "claude-sonnet-4-6[1m]"
      CLAUDE_CODE_SUBAGENT_MODEL: "claude-sonnet-4-6[1m]"
      ANTHROPIC_DEFAULT_OPUS_MODEL: "claude-opus-4-6[1m]"
    model: opus
  codex:
    service_tier: "fast"
    features:
      fast_mode: true
  gemini:
    model:
      name: "gemini-3.1-pro-preview"
    security:
      auth:
        selectedType: "gemini-api-key"
    ui:
      useFullWidth: true
exclude_symlinks:
  - ~/.config/goose/config.yaml
mcp_overrides:
  basic-memory:
    type: stdio
    command: /bin/bash
    args:
      - ~/.claude/hooks/basic-memory-runner.sh
    name: basic-memory
    description: Persistent markdown knowledge base with BM25+vector search and git sync
