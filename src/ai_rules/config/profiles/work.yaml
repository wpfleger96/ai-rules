name: work
description: Work laptop with extended context models
extends: personal
managed_tools:
  install_sources:
    ai-agent-rules: github
    statusline: github
settings_overrides:
  claude:
    env:
      ANTHROPIC_DEFAULT_SONNET_MODEL: "claude-sonnet-4-6[1m]"
      CLAUDE_CODE_SUBAGENT_MODEL: "claude-sonnet-4-6[1m]"
      ANTHROPIC_DEFAULT_OPUS_MODEL: "claude-opus-4-7[1m]"
      CLAUDE_CODE_EFFORT_LEVEL: "max"
    model: "opus[1m]"
  codex:
    service_tier: "fast"
    features:
      fast_mode: true
  gemini:
    model:
      name: "gemini-3.1-pro-preview"
    security:
      auth:
        selectedType: "gemini-api-key"
    ui:
      useFullWidth: true
exclude_symlinks:
  - ~/.config/goose/config.yaml
mcp_overrides:
  recall:
    type: stdio
    command: recall
    args:
      - mcp
      - stdio
    name: recall
    description: Persistent markdown knowledge base with FTS5 search and git sync
