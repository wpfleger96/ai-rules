name: personal
description: Personal configuration with additional tools and integrations
extends: default
settings_overrides:
  claude:
    model: opusplan
    hooks:
      Stop:
        - hooks:
            - type: command
              command: "python3 ~/.claude/hooks/recall_stop.py"
              timeout: 30
  statusline:
    terminal_title:
      enabled: true
plugins:
  - name: pyright-lsp
    marketplace: cc-marketplace
  - name: typescript-lsp
    marketplace: cc-marketplace
  - name: rust-analyzer-lsp
    marketplace: cc-marketplace
exclude_symlinks: []
mcp_overrides:
  recall:
    type: stdio
    command: recall
    args:
      - mcp
      - stdio
    name: recall
    description: Persistent markdown knowledge base with FTS5 search and git sync
