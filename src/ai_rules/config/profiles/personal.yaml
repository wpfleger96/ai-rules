name: personal
description: Personal configuration with additional tools and integrations
extends: default
settings_overrides:
  claude:
    model: opusplan
  statusline:
    terminal_title:
      enabled: true
exclude_symlinks: []
mcp_overrides:
  basic-memory:
    type: stdio
    command: /bin/bash
    args:
      - ~/.claude/hooks/basic-memory-runner.sh
    name: basic-memory
    description: Persistent markdown knowledge base with BM25+vector search and git sync
